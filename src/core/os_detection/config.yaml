# OS Detection Configuration
# Known domestic Chinese OS distributions

os_distributions:
  # Ubuntu Kylin - Chinese Ubuntu derivative
  - id: ubuntu-kylin
    name: Ubuntu Kylin
    family: debian
    version: "22.04"
    package_manager: apt
    command_paths:
      lsb_release: /usr/bin/lsb_release

  # Deepin - Popular Chinese desktop OS
  - id: deepin
    name: Deepin
    family: debian
    version: "20"
    package_manager: apt
    command_paths:
      deepin-version: /usr/bin/deepin-version

  # Anolis OS - Chinese enterprise OS (Alibaba)
  - id: anolis
    name: Anolis OS
    family: rhel
    version: "8"
    package_manager: dnf
    command_paths:
      anolis-repo: /usr/bin/anolis-repo

  # StartOS - Chinese server OS
  - id: startos
    name: StartOS
    family: debian
    version: "7"
    package_manager: apt
    command_paths:
      ctl: /usr/bin/ctl

  # openEuler - Chinese enterprise OS (Huawei)
  - id: openeuler
    name: openEuler
    family: rhel
    version: "22.03"
    package_manager: dnf
    command_paths:
      cat: /usr/bin/cat

  # UnionTech OS - Chinese desktop OS
  - id: uniontech
    name: UnionTech OS
    family: debian
    version: "20"
    package_manager: apt
    command_paths:
      cat: /usr/bin/cat

  # Kylin OS - Chinese official OS
  - id: kylin
    name: Kylin OS
    family: debian
    version: "10"
    package_manager: apt
    command_paths:
      cat: /usr/bin/cat

  # Standard Ubuntu (reference)
  - id: ubuntu
    name: Ubuntu
    family: debian
    version: "22.04"
    package_manager: apt
    command_paths:
      lsb_release: /usr/bin/lsb_release

  # Debian (reference)
  - id: debian
    name: Debian
    family: debian
    version: "11"
    package_manager: apt
    command_paths:
      cat: /bin/cat

  # CentOS (reference)
  - id: centos
    name: CentOS
    family: rhel
    version: "8"
    package_manager: dnf
    command_paths:
      cat: /usr/bin/cat

  # Fedora (reference)
  - id: fedora
    name: Fedora
    family: rhel
    version: "38"
    package_manager: dnf
    command_paths:
      cat: /usr/bin/cat
