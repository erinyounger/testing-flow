# Command Adapter Configuration
# OS-specific command mappings and overrides

# Default OS for command routing
default_os: linux

# OS-specific command overrides
command_overrides:
  # Ubuntu Kylin
  ubuntu-kylin:
    info:
      command: [lsb_release, -a]
    package_manager: apt

  # Deepin
  deepin:
    info:
      command: [deepin-version]
    version:
      command: [deepin-version]
    package_manager: apt

  # Anolis
  anolis:
    info:
      command: [cat, /etc/anolis-release]
    package_manager: dnf

  # StartOS
  startos:
    info:
      command: [ctl, sys, info]
    package_manager: apt

  # openEuler
  openeuler:
    info:
      command: [cat, /etc/os-release]
    package_manager: dnf

  # UnionTech OS
  uniontech:
    info:
      command: [cat, /etc/os-release]
    package_manager: apt

  # Kylin OS
  kylin:
    info:
      command: [cat, /etc/kylin-release]
    package_manager: apt

# Generic Linux defaults
generic:
  ls:
    command: [ls, -la]
  df:
    command: [df, -h]
  free:
    command: [free, -h]
  uptime:
    command: [uptime]
  ps:
    command: [ps, aux]
  ip:
    command: [ip, addr]
