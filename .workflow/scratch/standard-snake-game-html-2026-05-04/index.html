<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 科技风</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        .game-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .canvas-wrapper {
            position: relative;
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        #gameCanvas {
            display: block;
            background-color: #0a0a0f;
        }

        .controls {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            min-width: 280px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            color: #00ffff;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: #1a1a2e;
            border-radius: 3px;
            outline: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #00ffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #00ffff;
        }

        .control-group input[type="number"] {
            width: 100%;
            padding: 8px 12px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 5px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .control-group input[type="number"]:focus {
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .speed-value {
            text-align: right;
            color: #888;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00ffff 0%, #00cccc 100%);
            border: none;
            border-radius: 5px;
            color: #0a0a0f;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ff00ff 0%, #cc00cc 100%);
        }

        .btn-secondary:hover {
            box-shadow: 0 5px 20px rgba(255, 0, 255, 0.4);
        }

        .leaderboard {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            min-width: 280px;
            max-height: 400px;
        }

        .leaderboard h2 {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            margin-bottom: 15px;
            font-size: 1.3rem;
            text-align: center;
        }

        .leaderboard-list {
            list-style: none;
        }

        .leaderboard-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #2a2a3e;
            transition: background 0.2s;
        }

        .leaderboard-list li:nth-child(1) {
            color: #ffd700;
        }

        .leaderboard-list li:nth-child(2) {
            color: #c0c0c0;
        }

        .leaderboard-list li:nth-child(3) {
            color: #cd7f32;
        }

        .leaderboard-list li:hover {
            background: rgba(255, 0, 255, 0.1);
        }

        .rank {
            color: #888;
            min-width: 30px;
        }

        .username {
            flex: 1;
            margin: 0 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score {
            color: #00ffff;
            font-weight: bold;
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .game-over-overlay h2 {
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .game-over-overlay p {
            color: #00ffff;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .game-over-overlay input {
            padding: 10px 15px;
            background: #1a1a2e;
            border: 1px solid #00ffff;
            border-radius: 5px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 15px;
            width: 200px;
            text-align: center;
        }

        .game-over-overlay input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .instructions {
            color: #666;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
        }

        .instructions span {
            color: #00ffff;
        }

        .current-score {
            text-align: center;
            color: #00ffff;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .current-score strong {
            font-size: 1.5rem;
            text-shadow: 0 0 10px #00ffff;
        }
    </style>
</head>
<body>
    <h1>贪吃蛇 - 科技风</h1>

    <div class="current-score">
        当前分数: <strong id="currentScore">0</strong>
    </div>

    <div class="game-container">
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <div class="game-over-overlay" id="gameOverOverlay">
                <h2>游戏结束</h2>
                <p>得分: <span id="finalScore">0</span></p>
                <input type="text" id="usernameInput" placeholder="输入用户名" maxlength="20">
                <button class="btn" id="saveScoreBtn">保存分数</button>
                <button class="btn btn-secondary" id="restartBtn">重新开始</button>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>速度调节 (ms)</label>
                <input type="range" id="speedSlider" min="100" max="500" value="200" step="10">
                <div class="speed-value">当前: <span id="speedValue">200</span>ms</div>
            </div>

            <div class="control-group">
                <label>食物数量</label>
                <input type="number" id="foodCountInput" min="1" max="5" value="3">
            </div>

            <button class="btn" id="startBtn">开始游戏</button>
            <button class="btn btn-secondary" id="pauseBtn">暂停</button>

            <div class="instructions">
                方向键或 <span>WASD</span> 控制移动方向
            </div>
        </div>

        <div class="leaderboard">
            <h2>排行榜</h2>
            <ul class="leaderboard-list" id="leaderboardList">
                <li><span class="rank">-</span><span class="username">暂无记录</span><span class="score">-</span></li>
            </ul>
        </div>
    </div>

    <script>
        // Game Configuration
        const GRID_SIZE = 20;
        const CANVAS_WIDTH = 600;
        const CANVAS_HEIGHT = 400;
        const COLS = CANVAS_WIDTH / GRID_SIZE;
        const ROWS = CANVAS_HEIGHT / GRID_SIZE;

        // Colors
        const COLORS = {
            background: '#0a0a0f',
            grid: '#1a1a2e',
            snake: '#00ffff',
            snakeGlow: 'rgba(0, 255, 255, 0.5)',
            food: '#ff00ff',
            foodGlow: 'rgba(255, 0, 255, 0.5)'
        };

        // Game State
        let snake = [];
        let foods = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let gameSpeed = 200;
        let foodCount = 3;
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let lastUpdateTime = 0;
        let gameLoopId = null;

        // DOM Elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const foodCountInput = document.getElementById('foodCountInput');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const currentScoreEl = document.getElementById('currentScore');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const usernameInput = document.getElementById('usernameInput');
        const saveScoreBtn = document.getElementById('saveScoreBtn');
        const restartBtn = document.getElementById('restartBtn');
        const leaderboardList = document.getElementById('leaderboardList');

        // Initialize
        function init() {
            loadLeaderboard();
            setupEventListeners();
            drawGrid();
        }

        function setupEventListeners() {
            speedSlider.addEventListener('input', (e) => {
                gameSpeed = parseInt(e.target.value);
                speedValue.textContent = gameSpeed;
            });

            foodCountInput.addEventListener('change', (e) => {
                foodCount = Math.max(1, Math.min(5, parseInt(e.target.value) || 1));
                foodCountInput.value = foodCount;
            });

            startBtn.addEventListener('click', startGame);
            pauseBtn.addEventListener('click', togglePause);
            saveScoreBtn.addEventListener('click', saveScore);
            restartBtn.addEventListener('click', restartGame);

            document.addEventListener('keydown', handleKeydown);
        }

        function handleKeydown(e) {
            const key = e.key.toLowerCase();

            // WASD or Arrow keys
            if ((key === 'w' || key === 'arrowup') && direction.y !== 1) {
                nextDirection = { x: 0, y: -1 };
            } else if ((key === 's' || key === 'arrowdown') && direction.y !== -1) {
                nextDirection = { x: 0, y: 1 };
            } else if ((key === 'a' || key === 'arrowleft') && direction.x !== 1) {
                nextDirection = { x: -1, y: 0 };
            } else if ((key === 'd' || key === 'arrowright') && direction.x !== -1) {
                nextDirection = { x: 1, y: 0 };
            }

            // Prevent scrolling
            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(key)) {
                e.preventDefault();
            }
        }

        function startGame() {
            resetGame();
            gameRunning = true;
            gamePaused = false;
            startBtn.textContent = '游戏中';
            startBtn.disabled = true;
            gameOverOverlay.classList.remove('show');
            lastUpdateTime = performance.now();
            gameLoop();
        }

        function resetGame() {
            // Initialize snake in the center
            const centerX = Math.floor(COLS / 2);
            const centerY = Math.floor(ROWS / 2);
            snake = [
                { x: centerX, y: centerY },
                { x: centerX - 1, y: centerY },
                { x: centerX - 2, y: centerY }
            ];

            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            currentScoreEl.textContent = '0';

            // Generate initial food
            generateFood();
        }

        function generateFood() {
            const targetCount = foodCount - foods.length;

            for (let i = 0; i < targetCount; i++) {
                let newFood;
                let attempts = 0;

                do {
                    newFood = {
                        x: Math.floor(Math.random() * COLS),
                        y: Math.floor(Math.random() * ROWS)
                    };
                    attempts++;
                } while (isPositionOccupied(newFood) && attempts < 100);

                if (attempts < 100) {
                    foods.push(newFood);
                }
            }
        }

        function isPositionOccupied(pos) {
            // Check if position is on snake
            for (const segment of snake) {
                if (segment.x === pos.x && segment.y === pos.y) {
                    return true;
                }
            }

            // Check if position is on food
            for (const food of foods) {
                if (food.x === pos.x && food.y === pos.y) {
                    return true;
                }
            }

            return false;
        }

        function gameLoop(currentTime = 0) {
            if (!gameRunning) return;

            gameLoopId = requestAnimationFrame(gameLoop);

            const deltaTime = currentTime - lastUpdateTime;

            if (deltaTime >= gameSpeed) {
                lastUpdateTime = currentTime;

                if (!gamePaused) {
                    update();
                }
                draw();
            }
        }

        function update() {
            // Update direction
            direction = { ...nextDirection };

            // Calculate new head position
            const head = { ...snake[0] };
            head.x += direction.x;
            head.y += direction.y;

            // Wall wrapping
            if (head.x < 0) head.x = COLS - 1;
            if (head.x >= COLS) head.x = 0;
            if (head.y < 0) head.y = ROWS - 1;
            if (head.y >= ROWS) head.y = 0;

            // Check self collision
            for (const segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            // Add new head
            snake.unshift(head);

            // Check food collision
            let ate = false;
            for (let i = foods.length - 1; i >= 0; i--) {
                if (head.x === foods[i].x && head.y === foods[i].y) {
                    foods.splice(i, 1);
                    score += 10;
                    currentScoreEl.textContent = score;
                    ate = true;
                }
            }

            // Remove tail if no food eaten
            if (!ate) {
                snake.pop();
            }

            // Generate new food
            generateFood();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = COLORS.background;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Draw grid
            drawGrid();

            // Draw food
            for (const food of foods) {
                drawFood(food);
            }

            // Draw snake
            for (let i = 0; i < snake.length; i++) {
                drawSnakeSegment(snake[i], i === 0);
            }
        }

        function drawGrid() {
            ctx.strokeStyle = COLORS.grid;
            ctx.lineWidth = 0.5;

            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * GRID_SIZE, 0);
                ctx.lineTo(x * GRID_SIZE, CANVAS_HEIGHT);
                ctx.stroke();
            }

            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * GRID_SIZE);
                ctx.lineTo(CANVAS_WIDTH, y * GRID_SIZE);
                ctx.stroke();
            }
        }

        function drawSnakeSegment(pos, isHead) {
            const x = pos.x * GRID_SIZE;
            const y = pos.y * GRID_SIZE;
            const padding = 2;

            // Glow effect
            ctx.shadowColor = COLORS.snakeGlow;
            ctx.shadowBlur = isHead ? 15 : 10;

            // Main body
            ctx.fillStyle = COLORS.snake;
            ctx.fillRect(x + padding, y + padding, GRID_SIZE - padding * 2, GRID_SIZE - padding * 2);

            // Head highlight
            if (isHead) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(x + padding + 2, y + padding + 2, 4, 4);
            }

            ctx.shadowBlur = 0;
        }

        function drawFood(pos) {
            const x = pos.x * GRID_SIZE + GRID_SIZE / 2;
            const y = pos.y * GRID_SIZE + GRID_SIZE / 2;
            const radius = GRID_SIZE / 2 - 3;

            // Glow effect
            ctx.shadowColor = COLORS.foodGlow;
            ctx.shadowBlur = 15;

            // Main food circle
            ctx.fillStyle = COLORS.food;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();

            // Inner highlight
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x - 2, y - 2, radius / 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function togglePause() {
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(gameLoopId);

            finalScoreEl.textContent = score;
            gameOverOverlay.classList.add('show');

            startBtn.textContent = '开始游戏';
            startBtn.disabled = false;
            pauseBtn.textContent = '暂停';
        }

        function restartGame() {
            gameOverOverlay.classList.remove('show');
            startGame();
        }

        // Leaderboard functions
        function getLeaderboard() {
            const data = localStorage.getItem('snakeLeaderboard');
            return data ? JSON.parse(data) : [];
        }

        function saveLeaderboard(leaderboard) {
            localStorage.setItem('snakeLeaderboard', JSON.stringify(leaderboard));
        }

        function loadLeaderboard() {
            const leaderboard = getLeaderboard();
            renderLeaderboard(leaderboard);
        }

        function saveScore() {
            const username = usernameInput.value.trim() || '匿名玩家';
            const leaderboard = getLeaderboard();

            leaderboard.push({
                username: username,
                score: score,
                date: new Date().toISOString()
            });

            // Sort by score descending and keep top 10
            leaderboard.sort((a, b) => b.score - a.score);
            const top10 = leaderboard.slice(0, 10);

            saveLeaderboard(top10);
            renderLeaderboard(top10);

            // Clear input and hide overlay
            usernameInput.value = '';
            gameOverOverlay.classList.remove('show');

            // Reset start button
            startBtn.textContent = '开始游戏';
            startBtn.disabled = false;
        }

        function renderLeaderboard(leaderboard) {
            if (leaderboard.length === 0) {
                leaderboardList.innerHTML = '<li><span class="rank">-</span><span class="username">暂无记录</span><span class="score">-</span></li>';
                return;
            }

            leaderboardList.innerHTML = leaderboard.map((entry, index) => `
                <li>
                    <span class="rank">${index + 1}</span>
                    <span class="username">${escapeHtml(entry.username)}</span>
                    <span class="score">${entry.score}</span>
                </li>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Start
        init();
    </script>
</body>
</html>
