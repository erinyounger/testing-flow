# Server Test Framework Configuration
#
# Configuration file for server test framework including layers, plugins, and defaults.

# Logging configuration
log_level: INFO

# Layer configuration
layers:
  hardware:
    enabled: true
    timeout: 3600
    retry_count: 2

  component:
    enabled: true
    timeout: 1800
    retry_count: 1

  bmc:
    enabled: true
    timeout: 1800
    retry_count: 1

# Plugin configuration
plugins:
  enabled: []
  discovery: true
  entry_point_group: server_test_plugins

# Hardware connection settings
hardware:
  ipmi_host: "192.168.1.1"
  ipmi_user: "admin"
  ipmi_password: ""
  ipmi_port: 623

  bmc_host: "192.168.1.2"
  bmc_user: "admin"
  bmc_password: ""

  ssh_host: "192.168.1.10"
  ssh_user: "admin"
  ssh_key_path: ""

# Test execution settings
test:
  output_dir: "test-results"
  parallel_workers: 4
  retry_count: 0
  capture_logs: true
  fail_fast: false

# Hardware layer defaults
hardware_defaults:
  power_cycle_wait_seconds: 30
  boot_timeout_seconds: 300
  stress_test_duration_seconds: 60
  thermal_warning_threshold: 80
  thermal_critical_threshold: 95

# Component layer defaults
component_defaults:
  cpu_stress_threads: 0  # 0 = auto (all cores)
  memory_stress_percent: 50
  storage_io_size_mb: 1024
  network_test_duration_seconds: 10

# BMC layer defaults
bmc_defaults:
  sensor_reading_timeout: 10
  firmware_update_timeout: 600
  sel_cleared_verify: true
  redfish_validate_schema: true
